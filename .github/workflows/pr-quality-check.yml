name: PR Quality Nudges

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  nudge-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect docs/changelog changes
        id: changed
        run: |
          set -e
          CHANGED_FILES="$(jq -r '.pull_request.changed_files' <<< '${{ toJson(github.event) }}')"
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Check for docs/changelog presence
        id: diff
        run: |
          set -e
          git fetch origin ${{ github.base_ref }} --depth=1
          # List changed files
          CHANGED="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          echo "$CHANGED"
          NEED_DOCS=false
          if echo "$CHANGED" | grep -Eiq '(fluent_copier\.py|telegram_bridge\.py|mt5/.*\.(mq5|mqh)|setup_logging\.py|logging_config\.py|alert_system\.py)'; then
            if ! echo "$CHANGED" | grep -Eiq '(README\.md|CHANGELOG\.md|version_info\.txt)'; then
              NEED_DOCS=true
            fi
          fi
          echo "need_docs=$NEED_DOCS" >> $GITHUB_OUTPUT

      - name: Add “needs docs” label and comment
        if: steps.diff.outputs.need_docs == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['needs docs']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "👋 Heads up! This PR changes code but doesn't update docs/changelog.",
                "",
                "- Please consider updating **README.md**, **CHANGELOG.md**, and **version_info.txt** (if applicable).",
                "- If not needed, you can ignore this comment."
              ].join("\n")
            });
