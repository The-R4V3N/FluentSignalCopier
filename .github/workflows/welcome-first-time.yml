name: Welcome New Contributors

on:
  pull_request:
    types: [opened, reopened, edited]

permissions:
  pull-requests: write
  models: read

jobs:
  welcome:
    runs-on: ubuntu-latest
    if: github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    steps:
      - name: Skip if we already welcomed (idempotent)
        id: already
        uses: actions/github-script@v7
        with:
          script: |
            const token = "<!-- welcome-first-timer-v1 -->";
            const number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              per_page: 100,
            });
            core.setOutput("seen", comments.some(c => (c.body || "").includes(token)) ? "true" : "false");

      - name: Generate welcome message
        if: steps.already.outputs.seen != 'true'
        uses: actions/ai-inference@v1
        id: ai
        with:
          model: openai/gpt-4o-mini
          prompt: |
            Write a friendly welcome message for a first-time contributor. Include:
            1) Thank them for their first PR
            2) Mention checking CONTRIBUTING.md
            3) Offer to help if they have questions
            Keep it brief and encouraging.

      - name: Post welcome comment
        if: steps.already.outputs.seen != 'true' && steps.ai.outputs.response != ''
        uses: actions/github-script@v7
        with:
          script: |
            const number = context.payload.pull_request.number;
            const message = `${{ toJson(steps.ai.outputs.response) }}\n\n<!-- welcome-first-timer-v1 -->`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: message
            });
