name: Build Windows EXE on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Pin exact version to avoid 3.12 sneaking in
      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip

      - name: Verify Python version
        run: |
          python --version
          pip --version
          where python

      - name: Install deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build GUI exe (FluentSignalCopier)
        run: |
          pyinstaller --clean --noconsole --onefile `
            --name FluentSignalCopier `
            --icon app.ico `
            --add-data "app.ico;." `
            --collect-all qfluentwidgets --collect-all PySide6 `
            fluent_copier.py

      - name: (Optional) Build CLI exe (telegram_bridge)
        run: |
          pyinstaller --clean --onefile `
            --name TelegramBridge `
            telegram_bridge.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.ref_name }}
          path: |
            dist/FluentSignalCopier.exe
            dist/TelegramBridge.exe

      - name: Attach EXEs to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FluentSignalCopier.exe
            dist/TelegramBridge.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
