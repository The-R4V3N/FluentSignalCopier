name: Build & Upload Windows EXE (on Release)

on:
  release:
    types: [published]

permissions:
  contents: write   # required to upload files to the release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # use 3.11 for PySide6-Fluent-Widgets compatibility

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install pyinstaller here even if it's not in requirements.txt
          pip install pyinstaller

      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          # e.g. refs/tags/v0.9.1 -> 0.9.1
          TAG="${GITHUB_REF##*/}"
          echo "tag=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        shell: bash
        run: |
          pyinstaller --clean --noconsole --onefile \
            --name "FluentSignalCopier-${{ steps.ver.outputs.tag }}" \
            --icon ./app.ico \
            --add-data "app.ico;." \
            --collect-all qfluentwidgets --collect-all PySide6 \
            ./fluent_copier.py

      - name: Verify build outputs
        shell: bash
        run: |
          ls -la dist || dir dist

      - name: Upload EXE as workflow artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: FluentSignalCopier-${{ steps.ver.outputs.tag }}-win
          path: |
            dist/FluentSignalCopier-${{ steps.ver.outputs.tag }}.exe

      - name: Upload EXE & EA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FluentSignalCopier-${{ steps.ver.outputs.tag }}.exe
            mt5/FluentSignalCopier.mq5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
